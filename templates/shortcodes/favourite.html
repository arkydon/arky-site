{# Place a NEWLINE before and after each call to favourite shortcode to prevent an empty <p> at the top and bottom #}

{%- set items = load_data(path=path) -%}

<details class="favourite">
    <summary>{{ title }}</summary>
    <ul>
        {% for item in items %}
            <li>{{ item }}</li>
        {% endfor %}
    </ul>
</details>
